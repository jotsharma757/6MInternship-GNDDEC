 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <p id="clock"></p>

<script>
  function clock() {
    const now = new Date();

    document.getElementById("clock").innerText =
      now.getHours() + ":" +
      now.getMinutes() + ":" +
      now.getSeconds();
  }

  setInterval(clock, 1000);
</script>

 </body>
 </html>
