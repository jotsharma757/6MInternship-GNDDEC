<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content=" initial-scale=1.0">
    <title>Update-put</title>
</head>
<body>
    <h1>Update-put the data</h1>
    <script>
        fetch("https://jsonplaceholder.typicode.com/posts/1",{
            method:"PUT",
            headers:{
                "content-type" : "applictaion-type"
            },
            body:JSON.stringify({
                title:"update",
                body :"update-body",
                userId:1
            })
        })
        .then(res=>res.json())
        .then(data=>console.log(data))
    </script>
</body>
</html>
