<!DOCTYPE html>
<html>
<head>
  <title>setInterval Clock</title>
</head>
<body>

<h1>Digital Clock</h1>
<h2 id="clock"></h2>
<script>
    setInterval(() => {
        const time = new Date().toLocaleTimeString();
      document.getElementById("clock").innerText = time;
    } ,1000);
</script>
</body>
</html>
