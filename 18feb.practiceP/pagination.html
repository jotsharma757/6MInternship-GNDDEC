<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice-pagination</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <h1 class="font-bold m-7">Pagination</h1>
    <input type="text" id="search" placeholder="Search" class="border-2 m-5 p-3">

    <!---Table-->
    <table class="w-full max-w-xl border border-gray-400 m-5">
        <thead class="bg-gray-200">
            <tr>
                <th class="border px-4 py-2">ID No.</th>
                <th class="py-2 cursor-pointer px-4 border" id="sorted">Name</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
    <!---Pagination-->
    <div class="mt-4 flex items-center gap-4 m-7">
        <button id="prev" class="border-2   px-2 py-1 cursor-pointer">Prev</button>
        <span id="pageInfo"></span>
        <button id="next" class="border-2   px-2 py-1 cursor-pointer">Next</button>
    </div>

    <!----JAVASCRIPT-->
    <script>
        const search = document.querySelector("#search");
        const tbody = document.querySelector("#tbody");
        const prev = document.querySelector("#prev");
        const next = document.querySelector("#next");
        const pageInfo = document.querySelector("#pageInfo")
        const sorted = document.querySelector("#sorted")

        let allData = [];
        let currentPage = 1;
        let itemPerPage = 4;
        let nameAsc = true;
        let pageData = [];

        fetch("https://jsonplaceholder.typicode.com/users")
            .then(res => res.json())
            .then(data => {
                allData = data.map(user => ({
                    id: user.id,
                    name: user.name
                }));
                renderTable();

            });
        //renderTable
        function renderTable() {
            tbody.innerHTML = "";
            search.value = "";
            const start = (currentPage - 1) * itemPerPage;
            const end = start + itemPerPage;

            pageData = allData.slice(start, end);

            pageData.forEach(item => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                        <td class = "border px-4 py-2"> ${item.id}</td>
                        <td class = "border px-4 py-2">${item.name}</td>`;
                tbody.appendChild(tr);
            });
            const totalPages = Math.ceil(allData.length / itemPerPage);
            pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
            prev.disabled = currentPage === 1;
            next.disabled = currentPage === totalPages;

        }

        //Pagination
        next.addEventListener("click", () => {
            const totalPages = Math.ceil(allData.length / itemPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
            }
        });
        prev.addEventListener("click", () => {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }

        });
        //serch
         search.addEventListener("input",()=>{
            const sear = search.value.toLowerCase();
            tbody.innerHTML = "";

            pageData
            .filter(items => items.name.toLowerCase().includes(sear))
            .forEach(items =>{
                const tr = document.createElement("tr");
                tr.innerHTML = `
                <td class "border px-5 py-2">${items.id}</td>
                <td class "border px-5 py-2">${items.name}</td>`;
                tbody.appendChild(tr);
            });
            });
         
        //sort

        sorted.addEventListener("click", () => {
            nameAsc = !nameAsc;
            const newData = [...pageData].sort((a, b) =>
                nameAsc
                    ? a.name.localeCompare(b.name)
                    : b.name.localeCompare(a.name)
            );

            tbody.innerHTML = "";
            newData.forEach(items => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
        <td class = "border px-4 py-2">${items.id}</td>
        <td class = "border px-4 py-2">${items.name}</td>`;
                tbody.appendChild(tr);

            });
        });

    </script>
</body>

</html>
