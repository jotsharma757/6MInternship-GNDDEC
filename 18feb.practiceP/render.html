<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REnder the data</title>
</head>
<body>
    <h1>Rendering</h1>
    <button id="add">Add</button>
    <ul id="lists"></ul>

    <script>
        const add = document.querySelector("#add");
        const lists = document.querySelector("#lists")

        let items = ["Apple", "Grapes"];
        function render (){
            lists.innerHTML = items.map(item => `<li>${item}</li>`).join("")
        }
        render()
        add.addEventListener("click",() =>{
            items.push("mango");
              items.push("orange");
            render();
        });
    </script>
</body>
</html>
