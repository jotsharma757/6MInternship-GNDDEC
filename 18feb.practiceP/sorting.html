<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        //sort numbers---biggest to small and small to biggest
        const abc = [2, 3, 4, 5];
        abc.sort((a, b) => a - b);
        console.log(abc);

        abc.sort((a, b) => b - a);
        console.log(abc);
         
        //sort numbers---alphabetically;

        let asac = ["a", "k", "l", "h", "o"];
        asac.sort();
        console.log(asac);

        asac.sort().reverse();
        console.log(asac);
        //Sort objects by age
        const person = [
            { name: "nuriz", age: 56 },
            { name: "charlie", age: 22 },
            { name: "alice", age: 23 },
            { name: "nuriz", age: 96 },
            { name: "charlie", age: 42 },
            { name: "alice", age: 3 },
        ];
        person.sort((a, b) => a.age - b.age);
        console.log(person);

        //sort objects by product price

        const product = [
            { name: "laptop", price: 70000 },
            { name: "laptop", price: 60000 },
            { name: "laptop", price: 440000 },
            { name: "laptop", price: 20000 },
        ]
        product.sort((a, b) => a.price - b.price);
        console.log(product);
        // Sort students by marks (highest first
        const students = [
            { name: "arush", marks: 70 },
            { name: "latica", marks: 44 },
            { name: "tt", marks: 20 },
            { name: "alicep", marks: 60 },
        ]
        students.sort((a, b) => b.marks - a.marks);
        console.log(students);
        //Sort strings ignoring uppercase / lowercase
        const fruits = ["abc", "ASD","szknk"];
      fruits.sort((a,b) => a.toLowerCase().localeCompare(b.toLowerCase()));
      console.log(fruits);



    </script>
</body>

</html>
