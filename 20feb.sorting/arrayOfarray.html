        //Sort by first number (ascending).
        const data = [
            [5, "orange"],
            [2, "apple"],
            [8, "banana"]
        ];
        const sort = [...data].sort((a, b) => (a[0] - b[0]));
        console.log(sort);

        //Sort by second value (alphabetical order).
        const alpha = [
            {"1": "mango"},{"2": "mangoo"},{"3": "mangoo"}
        ];
        const sorting = [...alpha].sort((a, b) => a[1].localeCompare(b[1]));
        console.log(sorting);

        //Sort by first number (descending)
        const data1 = [
            [10, "A"],
            [3, "B"],
            [7, "C"]
        ];
        const sorted = [...data1].sort((a, b) => (b[0] - a[0]))
        console.log(sorted);

        //Sort by length of string (short name first).

            [2, "dog"],
            [3, "tiger"]
        ];
