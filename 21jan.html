<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript- variables(let,const)</title>
</head>

<body>
    <h2>hii</h2>
    <script>

        // Lazada API Example
        async function ab() {
            console.log("hi");
            
            const response = await fetch('https://open.lazada.com/doc/doc.htm', {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            const data = await response.json();
            console.log(data);
        }
        ab()
    </script>
</body>

</html>
