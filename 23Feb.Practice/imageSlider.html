<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-zinc-300">
    <style>
        .img {
            width: 400px;
            height: 250px;
            object-fit: cover;
        }
    </style>
    <div>
        <img id="img" src="https://images.pexels.com/photos/672630/pexels-photo-672630.jpeg" class="img" alt="">
        <div>
            <button id="prevBtn"
                class=" bg-blue-500 border rounded-xl cursor-pointer hover:bg-blue-700 px-3 py-2 m-5 font-bold">Previous</button>
            <button id="nextBtn"
                class="bg-blue-500 border rounded-xl cursor-pointer hover:bg-blue-700 px-3 py-2 m-3 font-bold">Next</button>
        </div>
    </div>

    <script>
        const images = [
            "https://cdn.pixabay.com/photo/2020/07/24/08/24/number-5433251_1280.png",
            "https://cdn.pixabay.com/photo/2015/04/04/19/13/two-706896_1280.jpg",
            "https://www.bing.com/th/id/OIP.NliuIpPdzQBXhUUzEB186gHaMO?w=177&h=204&c=8&rs=1&qlt=90&o=6&dpr=1.3&pid=3.1&rm=2"
        ];

        const img = document.getElementById("img")
        const prevBtn = document.getElementById("prevBtn")
        const nextBtn = document.getElementById("nextBtn")
        let index = 0;
        //Manual 
        prevBtn.addEventListener("click", () => {
            index = (index - 1)
            if (index < 0) {
                index = images.length - 1;
            }
            img.src = images[index]
        })

        nextBtn.addEventListener("click", () => {
            index = (index + 1)
            if (index >= images.length) {
                index = 0;
            }
            img.src = images[index]
        })
        //Auto
        setInterval(() => {
            index = (index + 1)
            if (index >= images.length) {
                index = 0;
            }
            img.src = images[index];
        }, 2000)
    </script>
</body>

</html>
