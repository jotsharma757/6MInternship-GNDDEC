<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image-Fetch</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <style>
        #op {
        display: grid;
        grid-template-columns: repeat(3, 4fr);
        gap: 10px;
}

    </style>
    <!-- <button id="btn"
        class="w-20 bg-blue-300 hover:bg-blue-800 cursor-pointer border rounded-lg m-5 px-2 py-1">Fetch</button> -->
 <div id="op" class="px-5 bg-gray-500  py-2"></div>
 <!---Javascript-->
    <script>
        // const btn = document.querySelector("#btn");
        // const deleteBtn = document.querySelector("#deleteBtn");
        
        const op = document.querySelector("#op")

        document.addEventListener("DOMContentLoaded", async () => {
            const res = await fetch("https://picsum.photos/v2/list")
              const data = await res.json();
            console.log(data);

            for (i = 11; i <= 30; i++) {
                const container = document.createElement("div");
                container.classList.add("m-2", "inline-block");

                const imgBox  =  document.createElement("div")
                imgBox.style.width = "250px";
                imgBox.style.height = "200px";
                imgBox.style.background = "white";
                imgBox.style.overflow = "hidden";
                
               

                const img = document.createElement("img");
                img.src = data[i].download_url
                img.style.width = "80%";
                img.style.height = "80%";
                img.style.objectFit = "cover"
               img.style.margin = "20px"
                

                const deleteBtn = document.createElement("button");
                deleteBtn.textContent = "Delete"
                deleteBtn.classList.add("block", "bg-blue-400", "mt-2", "px-2", "py-1","border","border-black","rounded-lg");

                deleteBtn.addEventListener("click", () =>{
                    container.remove();
                });
                imgBox.appendChild(img);
                container.appendChild(imgBox)
                container.appendChild(deleteBtn);
                op.appendChild(container);
            }
            });
