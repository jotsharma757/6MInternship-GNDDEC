<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100">

    <div class="bg-white p-6 rounded-lg shadow-md w-80 text-center">
        <h1 class="text-2xl font-bold mb-4">Number Guessing Game</h1>

        <input 
            type="text"
            id="guess"
            placeholder="Enter number (1–10)"
            class="w-full p-2 border rounded mb-3 text-center"
        >

        <button 
            id="btn"
            class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600"
        >
            Check the Number
        </button>

        <p class="mt-3 text-lg">
            Lives: <span id="lives" class="font-bold">5</span>
        </p>

        <p id="message" class="mt-3 font-semibold"></p>
    </div>

    <script>
        const guess = document.querySelector("#guess");
        const btn = document.querySelector("#btn");
        const message = document.querySelector("#message");
        const livesEl = document.querySelector("#lives");

        let randomNum = Math.floor(Math.random() * 10) + 1;
        let lives = 5;

        btn.addEventListener("click", () => {
            const userGuess = Number(guess.value);

            if (!userGuess || userGuess < 1 || userGuess > 10) {
                message.textContent = "Enter a number between 1 and 10";
                return;
            }

            if (userGuess === randomNum) {
                message.textContent = "🎉 Congratulations! You guessed the number!";
                btn.disabled = true;
            } else {
                lives--;
                livesEl.textContent = lives;

                if (lives === 0) {
                    message.textContent = "❌ Game Over! Number was " + randomNum;
                    btn.disabled = true;
                } else if (userGuess < randomNum) {
                    message.textContent = "📉 Too Low!";
                } else {
                    message.textContent = "📈 Too High!";
                }
            }

            guess.value = "";
        });
    </script>
</body>

</html>
