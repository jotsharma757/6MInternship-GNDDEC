<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project--Scroll App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="font-sans bg-gray-100 ">
    <div id="container" class="max-w-[500px] m-auto mt-10 flex flex-col items-center space-y-2"></div>
    <div id="loading" class="text-center p-4 text-white bg-gray-500 rounded-lg mt-4">Loading...</div>

    <script>
        const container = document.getElementById("container")
        const loading = document.getElementById("loading")
        let count = 0;
        function loadData() {
            if(count>=50){
                loading.innerHTML="the end"
                return}
            for (let i = 0; i < 10; i++) {
                count++;
                const data = document.createElement("div")
                data.className = "p-2 bg-white w-full text-center rounded shadow";
                data.textContent = "data" + count;
                container.appendChild(data)
            }
        }
        loadData();

      const observe = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting) {
        console.log("visible (preload)");
        setTimeout(() => {
            loadData();
        }, 500);
    } else {
        console.log("not visible");
    }
}, {
    root: null,          // viewport
    rootMargin: "0px 0px 200px 0px", // bottom margin = 200px → preload before fully visible
    threshold: 0          // trigger when any part appears in the margin
});

observe.observe(loading);

        observe.observe(loading)
        
    </script>
</body>

</html>
